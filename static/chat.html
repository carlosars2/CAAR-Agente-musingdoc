<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musing Doc — Chat com o Doc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .header-info span {
      font-size: 12px;
      color: #94a3b8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.bot {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: #6366f1;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.typing {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      border-bottom-left-radius: 4px;
      color: #94a3b8;
    }

    .typing-dots span {
      animation: blink 1.4s infinite;
      font-size: 20px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    .input-area {
      background: #1e293b;
      border-top: 1px solid #334155;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
    }

    #message-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }

    #message-input:focus {
      border-color: #6366f1;
    }

    #message-input::placeholder {
      color: #64748b;
    }

    #send-btn {
      background: #6366f1;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { background: #475569; cursor: not-allowed; }

    .welcome {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      padding: 8px;
    }

    @media (max-width: 640px) {
      .message { max-width: 90%; }
      #chat-container { padding: 16px; }
      .input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">D</div>
    <div class="header-info">
      <h1>Doc — Musing Doc</h1>
      <span><span class="status-dot"></span>Online</span>
    </div>
  </header>

  <div id="chat-container">
    <div class="welcome">Converse com o Doc, assistente virtual da Musing Doc</div>
  </div>

  <div class="input-area">
    <textarea id="message-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <button id="send-btn">Enviar</button>
  </div>

  <script>
    const API_URL = 'http://localhost:8000/api/chat';
    const SESSION_ID = 'chat-' + Math.random().toString(36).substring(2, 10);

    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msg;
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'message typing';
      msg.id = 'typing-indicator';
      msg.innerHTML = '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID, message: text }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addMessage(`Erro: ${err.detail || res.statusText}`, 'bot');
        } else {
          const data = await res.json();
          addMessage(data.response, 'bot');
        }
      } catch (e) {
        removeTyping();
        addMessage('Erro de conexão. Verifique se o servidor está rodando.', 'bot');
      }

      sendBtn.disabled = false;
      messageInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    });

    messageInput.focus();
  </script>

</body>
</html>
